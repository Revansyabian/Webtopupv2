<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pemeliharan sedang berlangsung</title>
  <link rel="stylesheet" href="maintenance.css">
</head>
<body>

 

  <div class="maintenance-container">
    <div class="maintenance-icon">🔧</div>
    <h1 id="maintenanceTitle">Sedang Dalam Pemeliharaan</h1>

    </div>

    <div class="check-status">

      <button class="check-button" onclick="checkMaintenanceStatus()">Periksa Status Sekarang</button>
    </div>
  </div>
